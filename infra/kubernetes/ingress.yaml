---
# Ingress Configuration for Trading Platform
# Version: 1.0.0
# Purpose: Route external traffic to API Gateway with TLS

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway-ingress
  namespace: trading-platform
  labels:
    app: api-gateway
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://app.trading-platform.local"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-connections: "10"
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/enable-owasp-core-rules: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.trading-platform.local
    - trading-platform.local
    - app.trading-platform.local
    - admin.trading-platform.local
    - api.stockmarketagent.com
    secretName: stockmarket-tls-cert
  rules:
  - host: api.trading-platform.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              name: http
  - host: trading-platform.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              name: http
  - host: app.trading-platform.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              name: http
  - host: admin.trading-platform.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              name: http
  - host: api.stockmarketagent.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              name: http

---

# HTTPS/TLS Certificate (Let's Encrypt)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: stockmarket-tls-cert
  namespace: trading-platform
spec:
  secretName: stockmarket-tls-cert
  duration: 2160h  # 90 days
  renewBefore: 720h  # 30 days
  commonName: api.trading-platform.local
  dnsNames:
  - api.trading-platform.local
  - trading-platform.local
  - app.trading-platform.local
  - admin.trading-platform.local
  - api.stockmarketagent.com
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer

---

# ClusterIssuer for Let's Encrypt certificates
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@stockmarketagent.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: nginx
    - dns01:
        cloudflare:
          email: admin@stockmarketagent.com
          apiTokenSecretRef:
            name: cloudflare-api-token
            key: api-token

---

# NGINX Ingress Controller Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: ingress-nginx
data:
  # Security headers
  add-headers: "trading-platform/custom-headers"
  
  # Performance tuning
  upstream-keepalive-connections: "32"
  upstream-keepalive-timeout: "60"
  upstream-keepalive-requests: "100"
  
  # Timeouts
  proxy-connect-timeout: "60"
  proxy-send-timeout: "60"
  proxy-read-timeout: "60"
  
  # Limits
  limit-rps: "50"
  limit-connections: "10"
  
  # Buffer sizes
  client-body-buffer-size: "10m"
  proxy-body-size: "10m"
  
  # Gzip compression
  gzip: "true"
  gzip-level: "6"
  gzip-min-length: "1000"
  gzip-types: "application/json application/javascript text/css text/x-javascript"
  
  # Security
  enable-modsecurity: "true"
  enable-owasp-core-rules: "true"

---

# Internal Service for inter-service communication (api-gateway specific)
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-internal
  namespace: trading-platform
  labels:
    app: api-gateway
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for DNS round-robin
  ports:
  - name: http
    port: 3000
    targetPort: http
    protocol: TCP
  selector:
    app: api-gateway

---

# Network Policy for Ingress Controller
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-api-gateway
  namespace: trading-platform
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 3000

---

# Health Check Service for ingress
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-health
  namespace: trading-platform
  labels:
    app: api-gateway
spec:
  type: ClusterIP
  ports:
  - name: health
    port: 3000
    targetPort: http
    protocol: TCP
  selector:
    app: api-gateway

---

# Custom NGINX ConfigMap with security headers
apiVersion: v1
kind: ConfigMap
metadata:
  name: custom-headers
  namespace: trading-platform
data:
  X-Frame-Options: "DENY"
  X-Content-Type-Options: "nosniff"
  X-XSS-Protection: "1; mode=block"
  Referrer-Policy: "strict-origin-when-cross-origin"
  Content-Security-Policy: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; media-src 'self'; object-src 'none'"
  Strict-Transport-Security: "max-age=31536000; includeSubDomains; preload"
  Permissions-Policy: "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
