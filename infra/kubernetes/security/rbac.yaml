---
# RBAC for User Service (Minimal Permissions)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: user-service
  namespace: production

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: user-service
  namespace: production
rules:
  - apiGroups: ['']
    resources: ['secrets']
    resourceNames: ['user-service-db-credentials']
    verbs: ['get']

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: user-service
  namespace: production
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: user-service
subjects:
  - kind: ServiceAccount
    name: user-service
    namespace: production

