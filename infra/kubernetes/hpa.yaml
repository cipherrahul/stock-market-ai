---
# Advanced Horizontal Pod Autoscaling Configuration
# Version: 1.0.0
# Purpose: Auto-scale services based on CPU, memory, and custom metrics

apiVersion: v1
kind: ConfigMap
metadata:
  name: hpa-settings
  namespace: trading-platform
data:
  # HPA behavior configuration
  scale-up-stabilization-seconds: "0"
  scale-down-stabilization-seconds: "300"
  target-cpu-utilization-percentage: "70"
  target-memory-utilization-percentage: "75"
  
  # Custom metrics thresholds
  http-requests-per-second: "1000"
  database-connection-pool-percentage: "80"
  cache-hit-ratio-target: "90"
  
  # Scaling bounds
  min-replicas: "3"
  max-replicas-api-gateway: "15"
  max-replicas-trading-engine: "12"
  max-replicas-portfolio: "8"
  max-replicas-auth: "10"

---

# API Gateway HPA with custom metrics
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa-advanced
  namespace: trading-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 3
  maxReplicas: 15
  metrics:
  # Primary metric: CPU utilization
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  # Secondary metric: Memory utilization
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  # Custom metric: Requests per second
  - type: Pods
    pods:
      metric:
        name: http_requests_per_second
      target:
        type: AverageValue
        averageValue: "1000"
  behavior:
    # Scale up aggressively
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 2
        periodSeconds: 15
      selectPolicy: Max
    # Scale down conservatively
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 1
        periodSeconds: 60
      selectPolicy: Min

---

# Trading Engine Service HPA
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: trading-engine-hpa-advanced
  namespace: trading-platform
spec:
