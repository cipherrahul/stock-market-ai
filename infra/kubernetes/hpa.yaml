---

# Metrics Server (required for HPA to work)
apiVersion: v1
kind: Service
metadata:
  name: metrics-server
  namespace: kube-system
spec:
  ports:
  - port: 443
    targetPort: 4443
  selector:
    k8s-app: metrics-server

---

# Custom Metrics ConfigMap for monitoring
apiVersion: v1
kind: ConfigMap
metadata:
  name: custom-metrics-config
  namespace: trading-platform
data:
  rules.yaml: |
    groups:
    - name: trading_platform_metrics
      interval: 30s
      rules:
      
      # API Gateway metrics
      - record: api_gateway:http_requests_per_second
        expr: rate(http_requests_total[1m])
      
      - record: api_gateway:http_error_rate
        expr: rate(http_requests_total{status=~"5.."}[1m])
      
      - record: api_gateway:http_latency_p95
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m]))
      
      # Trading metrics
      - record: trading:trades_per_minute
        expr: rate(trading_orders_executed_total[1m])
      
      - record: trading:execution_success_rate
        expr: rate(trading_orders_executed_total{status="success"}[5m]) / rate(trading_orders_total[5m])
      
      - record: trading:average_execution_price
        expr: rate(trading_total_execution_value[5m]) / rate(trading_orders_executed_total[5m])
      
      # Database metrics
      - record: database:connection_pool_utilization
        expr: (pg_stat_activity_count / pg_settings_max_connections) * 100
      
      - record: database:query_latency_p95
        expr: histogram_quantile(0.95, rate(pg_query_duration_seconds_bucket[5m]))
      
      - record: database:slow_queries_per_minute
        expr: rate(pg_slow_queries_total[1m])
      
      # Portfolio metrics
      - record: portfolio:rebalancing_operations_per_hour
        expr: rate(portfolio_rebalancing_total[1h])
      
      # Risk metrics
      - record: risk:positions_over_limit
        expr: count(position_size_relative_to_portfolio > 0.1)
      
      - record: risk:portfolio_variance_alert
        expr: count(portfolio_variance > 0.25)

---

# Prometheus Rules for HPA (ServiceMonitor)
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: hpa-alerts
  namespace: trading-platform
spec:
  groups:
  - name: hpa_scaling_alerts
    interval: 30s
    rules:
    
    # Alert: HPA at max replicas
    - alert: HPAAtMaxReplicas
      expr: |
        (kube_hpa_status_current_replicas / kube_hpa_status_desired_replicas) == 1 
        and kube_hpa_status_current_replicas > 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "HPA '{{ $labels.hpa }}' is at max replicas"
        description: "Service {{ $labels.hpa }} has scaled to maximum replicas. Manual intervention may be needed."
    
    # Alert: HPA unable to scale
    - alert: HPAUnableToScale
      expr: |
        (kube_hpa_status_desired_replicas / kube_hpa_status_current_replicas) > 1.1
        or (kube_hpa_status_current_replicas / kube_hpa_status_desired_replicas) > 1.1
      for: 10m
      labels:
        severity: critical
      annotations:
        summary: "HPA '{{ $labels.hpa }}' unable to meet desired replicas"
        description: "HPA is unable to scale to desired replica count"
    
    # Alert: Scaling rate limit hit
    - alert: HPAScalingRateLimit
      expr: |
        rate(kubernetes_build_info[5m]) > 0.1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "HPA scaling rate may be limited"
        description: "Pod creation rate is high, HPA may be hitting rate limits"

---

# Vertical Pod Autoscaler (VPA) for right-sizing (optional)
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: api-gateway-vpa
  namespace: trading-platform
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  updatePolicy:
    updateMode: "Off"  # Set to "Auto" in production after testing
  resourcePolicy:
    containerPolicies:
    - containerName: api-gateway
      minAllowed:
        cpu: 100m
        memory: 128Mi
      maxAllowed:
        cpu: 2
        memory: 1Gi
      controlledResources:
      - cpu
      - memory

---

# PDB (Pod Disruption Budget) to prevent too many pod evictions during scaling
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: trading-platform-pdb
  namespace: trading-platform
spec:
  minAvailable: 2
  selector:
    matchLabels:
      critical: "true"
